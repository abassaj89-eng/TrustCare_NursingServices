<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background: transparent -->

  <!-- Outer decorative ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#266AFB" stroke-width="1" opacity="0.2"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#059669" stroke-width="1" opacity="0.15"/>

  <!-- Teal decorative dots around shield -->
  <circle cx="200" cy="24" r="7" fill="#059669" opacity="0.7"/>
  <circle cx="334" cy="82" r="6" fill="#059669" opacity="0.6"/>
  <circle cx="372" cy="220" r="5" fill="#266AFB" opacity="0.5"/>
  <circle cx="316" cy="352" r="6" fill="#059669" opacity="0.6"/>
  <circle cx="200" cy="380" r="5" fill="#059669" opacity="0.5"/>
  <circle cx="84" cy="352" r="6" fill="#059669" opacity="0.6"/>
  <circle cx="28" cy="220" r="5" fill="#266AFB" opacity="0.5"/>
  <circle cx="66" cy="82" r="6" fill="#059669" opacity="0.6"/>

  <!-- Additional accent dots -->
  <circle cx="252" cy="36" r="4" fill="#059669" opacity="0.4"/>
  <circle cx="148" cy="36" r="4" fill="#059669" opacity="0.4"/>
  <circle cx="356" cy="148" r="4" fill="#266AFB" opacity="0.4"/>
  <circle cx="44" cy="148" r="4" fill="#266AFB" opacity="0.4"/>
  <circle cx="356" cy="252" r="4" fill="#266AFB" opacity="0.4"/>
  <circle cx="44" cy="252" r="4" fill="#266AFB" opacity="0.4"/>

  <!-- Main shield shape (large, centred) -->
  <path d="M200 50 L330 100 L330 210 Q330 310 200 360 Q70 310 70 210 L70 100 Z" fill="#003588"/>

  <!-- Shield inner layer (teal border effect) -->
  <path d="M200 50 L330 100 L330 210 Q330 310 200 360 Q70 310 70 210 L70 100 Z" stroke="#059669" stroke-width="3" fill="none"/>

  <!-- Shield inner decorative band -->
  <path d="M200 70 L314 114 L314 210 Q314 296 200 340 Q86 296 86 210 L86 114 Z" fill="#061535" opacity="0.7"/>

  <!-- Shield inner fill -->
  <path d="M200 80 L306 120 L306 210 Q306 288 200 330 Q94 288 94 210 L94 120 Z" fill="#003588" opacity="0.8"/>

  <!-- Large medical cross in centre -->
  <rect x="170" y="150" width="60" height="20" rx="8" fill="#FFFFFF"/>
  <rect x="190" y="130" width="20" height="60" rx="8" fill="#FFFFFF"/>

  <!-- Subtle glow on cross -->
  <rect x="170" y="150" width="60" height="20" rx="8" fill="#059669" opacity="0.15"/>
  <rect x="190" y="130" width="20" height="60" rx="8" fill="#059669" opacity="0.15"/>

  <!-- Shield shine/highlight -->
  <path d="M140 100 Q160 95 170 120 Q155 140 140 130 Z" fill="#FFFFFF" opacity="0.06"/>
</svg>
