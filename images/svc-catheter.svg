<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Dark blue circle background -->
  <circle cx="60" cy="60" r="58" fill="#003588"/>

  <!-- Catheter tube - curved line -->
  <path d="M30 85 Q30 60 50 55 Q70 50 75 35" stroke="#93c5fd" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- Connector piece at top -->
  <rect x="68" y="25" width="22" height="16" rx="5" fill="#059669"/>
  <!-- Y-connector -->
  <rect x="76" y="38" width="6" height="14" rx="3" fill="#059669"/>
  <line x1="79" y1="48" x2="65" y2="60" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
  <line x1="79" y1="48" x2="93" y2="60" stroke="#266AFB" stroke-width="5" stroke-linecap="round"/>

  <!-- Tube end cap at bottom -->
  <ellipse cx="30" cy="85" rx="9" ry="9" fill="#FFFFFF"/>
  <ellipse cx="30" cy="85" rx="5" ry="5" fill="#93c5fd"/>

  <!-- Small drip drop -->
  <path d="M88 65 Q88 58 92 55 Q96 58 96 65 Q96 70 92 70 Q88 70 88 65Z" fill="#059669"/>
