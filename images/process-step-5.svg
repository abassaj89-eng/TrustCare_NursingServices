<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Circle background -->
  <circle cx="40" cy="40" r="38" fill="#003588"/>

  <!-- Large chat bubble (main) -->
  <rect x="14" y="18" width="44" height="30" rx="10" fill="#FFFFFF"/>
  <!-- Bubble tail -->
  <path d="M22 48 L16 60 L36 48Z" fill="#FFFFFF"/>

  <!-- Document / lines inside bubble (report) -->
  <rect x="20" y="25" width="24" height="3" rx="1.5" fill="#E8F0F7"/>
  <rect x="20" y="32" width="18" height="3" rx="1.5" fill="#E8F0F7"/>
  <rect x="20" y="39" width="20" height="3" rx="1.5" fill="#E8F0F7"/>

  <!-- Small secondary bubble (teal) - response -->
  <rect x="38" y="44" width="28" height="20" rx="8" fill="#059669"/>
  <!-- Secondary bubble tail -->
  <path d="M60 64 L66 72 L50 64Z" fill="#059669"/>
  <!-- Phone icon inside secondary bubble -->
  <rect x="47" y="49" width="10" height="10" rx="3" fill="#FFFFFF" opacity="0.9"/>
  <!-- Screen lines on phone -->
  <rect x="49" y="52" width="6" height="2" rx="1" fill="#059669"/>
  <rect x="49" y="55" width="4" height="2" rx="1" fill="#059669"/>
</svg>
