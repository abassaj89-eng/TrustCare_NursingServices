<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Dark blue circle background -->
  <circle cx="60" cy="60" r="58" fill="#003588"/>

  <!-- Simplified neck/throat outline -->
  <path d="M45 22 Q38 22 36 30 L36 70 Q36 82 45 85 L75 85 Q84 82 84 70 L84 30 Q82 22 75 22 Z" fill="#061535"/>
  <path d="M45 22 Q38 22 36 30 L36 70 Q36 82 45 85 L75 85 Q84 82 84 70 L84 30 Q82 22 75 22 Z" stroke="#FFFFFF" stroke-width="2.5" fill="none"/>

  <!-- Trachea/airway column inside -->
  <rect x="52" y="25" width="16" height="55" rx="8" fill="#003588"/>
  <rect x="52" y="25" width="16" height="55" rx="8" stroke="#93c5fd" stroke-width="2" fill="none"/>
  <!-- Tracheal rings -->
  <rect x="50" y="34" width="20" height="5" rx="2.5" fill="#93c5fd" opacity="0.6"/>
  <rect x="50" y="44" width="20" height="5" rx="2.5" fill="#93c5fd" opacity="0.6"/>
  <rect x="50" y="54" width="20" height="5" rx="2.5" fill="#93c5fd" opacity="0.6"/>
  <rect x="50" y="64" width="20" height="5" rx="2.5" fill="#93c5fd" opacity="0.6"/>

  <!-- Tracheostomy tube (going into trachea) -->
  <rect x="36" y="52" width="20" height="10" rx="5" fill="#059669"/>
  <!-- Tube flange/plate -->
  <rect x="30" y="50" width="14" height="14" rx="4" fill="#059669"/>
  <!-- Tube connector -->
  <circle cx="28" cy="57" r="6" fill="#FFFFFF" stroke="#059669" stroke-width="2"/>

  <!-- Wing/flange ties -->
  <line x1="30" y1="52" x2="20" y2="46" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="62" x2="20" y2="68" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
</svg>
