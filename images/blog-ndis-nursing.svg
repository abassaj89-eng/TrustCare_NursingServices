<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#003588"/>

  <!-- Sky area (upper) -->
  <rect x="4" y="4" width="192" height="120" rx="96" fill="#003588"/>

  <!-- House outline -->
  <!-- House walls -->
  <rect x="52" y="110" width="96" height="72" rx="4" fill="#061535"/>
  <rect x="52" y="110" width="96" height="72" rx="4" stroke="#266AFB" stroke-width="2.5" fill="none"/>

  <!-- Roof -->
  <path d="M42 114 L100 58 L158 114Z" fill="#003588"/>
  <path d="M42 114 L100 58 L158 114Z" stroke="#266AFB" stroke-width="2.5" fill="none"/>

  <!-- Teal door -->
  <rect x="83" y="138" width="34" height="44" rx="6" fill="#059669"/>
  <!-- Door handle -->
  <circle cx="112" cy="162" r="4" fill="#FFFFFF"/>
  <!-- Door window -->
  <rect x="89" y="144" width="10" height="10" rx="3" fill="#93c5fd" opacity="0.7"/>

  <!-- Window left -->
  <rect x="60" y="118" width="24" height="20" rx="4" fill="#93c5fd" opacity="0.5"/>
  <line x1="72" y1="118" x2="72" y2="138" stroke="#266AFB" stroke-width="1.5"/>
  <line x1="60" y1="128" x2="84" y2="128" stroke="#266AFB" stroke-width="1.5"/>

  <!-- Window right -->
  <rect x="116" y="118" width="24" height="20" rx="4" fill="#93c5fd" opacity="0.5"/>
  <line x1="128" y1="118" x2="128" y2="138" stroke="#266AFB" stroke-width="1.5"/>
  <line x1="116" y1="128" x2="140" y2="128" stroke="#266AFB" stroke-width="1.5"/>

  <!-- Nurse figure approaching (right of house) -->
  <!-- Nurse head -->
  <circle cx="158" cy="102" r="12" fill="#E8F0F7"/>
  <!-- Nurse cap -->
  <rect x="148" y="94" width="20" height="6" rx="3" fill="#FFFFFF"/>
  <!-- Nurse body -->
  <rect x="149" y="114" width="18" height="24" rx="8" fill="#FFFFFF" opacity="0.9"/>
  <!-- Medical bag -->
  <rect x="138" y="120" width="14" height="12" rx="4" fill="#059669"/>
  <!-- Bag cross -->
  <rect x="141" y="124" width="8" height="2" rx="1" fill="#FFFFFF"/>
  <rect x="144" y="121" width="2" height="8" rx="1" fill="#FFFFFF"/>

  <!-- Path to door -->
  <path d="M152 178 Q145 178 138 178 Q120 178 100 178" stroke="#266AFB" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- Decorative bushes -->
  <ellipse cx="62" cy="180" rx="16" ry="10" fill="#059669" opacity="0.6"/>
  <ellipse cx="138" cy="180" rx="16" ry="10" fill="#059669" opacity="0.6"/>

  <!-- Ground line -->
  <rect x="10" y="180" width="180" height="4" rx="2" fill="#266AFB" opacity="0.3"/>
</svg>
