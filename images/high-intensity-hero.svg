<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Deep blue background -->
  <rect width="800" height="500" fill="#061535"/>

  <!-- Floor line -->
  <rect x="0" y="420" width="800" height="80" fill="#003588" opacity="0.5"/>

  <!-- ===== VENTILATOR / MEDICAL MACHINE (right side) ===== -->
  <!-- Machine body -->
  <rect x="530" y="160" width="200" height="240" rx="12" fill="#003588"/>
  <rect x="530" y="160" width="200" height="240" rx="12" stroke="#266AFB" stroke-width="2" fill="none"/>

  <!-- Machine screen/display -->
  <rect x="548" y="178" width="164" height="90" rx="8" fill="#061535"/>
  <rect x="548" y="178" width="164" height="90" rx="8" stroke="#059669" stroke-width="1.5" fill="none"/>
  <!-- Waveform on screen (teal glow) -->
  <polyline points="558,230 575,215 588,240 605,200 622,235 638,218 655,238 672,210 700,225" stroke="#059669" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Screen data labels (simplified blocks) -->
  <rect x="558" y="255" width="30" height="6" rx="2" fill="#93c5fd" opacity="0.6"/>
  <rect x="558" y="265" width="22" height="6" rx="2" fill="#059669" opacity="0.6"/>
  <rect x="620" y="255" width="30" height="6" rx="2" fill="#93c5fd" opacity="0.6"/>
  <rect x="620" y="265" width="22" height="6" rx="2" fill="#059669" opacity="0.6"/>
  <rect x="680" y="255" width="24" height="6" rx="2" fill="#93c5fd" opacity="0.6"/>

  <!-- Dials/knobs -->
  <circle cx="570" cy="310" r="18" fill="#061535" stroke="#266AFB" stroke-width="2"/>
  <line x1="570" y1="296" x2="570" y2="303" stroke="#266AFB" stroke-width="2" stroke-linecap="round"/>
  <circle cx="570" cy="310" r="6" fill="#266AFB"/>

  <circle cx="620" cy="310" r="18" fill="#061535" stroke="#059669" stroke-width="2"/>
  <line x1="620" y1="296" x2="625" y2="302" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
  <circle cx="620" cy="310" r="6" fill="#059669"/>

  <circle cx="670" cy="310" r="18" fill="#061535" stroke="#266AFB" stroke-width="2"/>
  <line x1="670" y1="296" x2="664" y2="301" stroke="#266AFB" stroke-width="2" stroke-linecap="round"/>
  <circle cx="670" cy="310" r="6" fill="#266AFB"/>

  <!-- Ventilator tubing going left -->
  <path d="M530 280 Q460 280 440 300 Q420 320 380 325" stroke="#059669" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Buttons row -->
  <rect x="548" y="345" width="14" height="8" rx="4" fill="#059669"/>
  <rect x="568" y="345" width="14" height="8" rx="4" fill="#266AFB"/>
  <rect x="588" y="345" width="14" height="8" rx="4" fill="#93c5fd" opacity="0.7"/>
  <rect x="608" y="345" width="14" height="8" rx="4" fill="#059669"/>

  <!-- Machine stand/base -->
  <rect x="610" y="400" width="10" height="22" fill="#003588"/>
  <ellipse cx="615" cy="422" rx="30" ry="8" fill="#003588" stroke="#266AFB" stroke-width="1.5"/>

  <!-- ===== PATIENT BED (centre) ===== -->
  <!-- Bed frame -->
  <rect x="220" y="340" width="310" height="18" rx="8" fill="#003588" stroke="#266AFB" stroke-width="1.5"/>
  <rect x="200" y="354" width="340" height="12" rx="6" fill="#266AFB" opacity="0.4"/>
  <!-- Pillow -->
  <ellipse cx="480" cy="335" rx="48" ry="22" fill="#E8F0F7" opacity="0.9"/>
  <!-- Patient body under blanket -->
  <rect x="230" y="308" width="240" height="38" rx="18" fill="#93c5fd" opacity="0.5"/>
  <!-- Blanket fold line -->
  <path d="M230 316 Q350 310 470 316" stroke="#266AFB" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Patient head -->
  <ellipse cx="480" cy="322" rx="26" ry="24" fill="#E8F0F7"/>
  <!-- Patient face features (minimal) -->
  <ellipse cx="472" cy="318" rx="4" ry="3" fill="#93c5fd" opacity="0.5"/>
  <ellipse cx="488" cy="318" rx="4" ry="3" fill="#93c5fd" opacity="0.5"/>

  <!-- PEG tube on patient (simplified) -->
  <ellipse cx="310" cy="308" rx="12" ry="8" fill="#059669" opacity="0.8"/>
  <rect x="298" y="296" width="6" height="16" rx="3" fill="#059669"/>
  <!-- PEG connector -->
  <circle cx="301" cy="292" r="7" fill="#003588" stroke="#059669" stroke-width="2"/>

  <!-- Ventilator mask on patient face -->
  <ellipse cx="480" cy="328" rx="18" ry="12" fill="#266AFB" opacity="0.5"/>
  <!-- Tube from mask to ventilator -->
  <path d="M480 332 Q450 340 430 330 Q410 320 390 324 Q385 325 380 325" stroke="#059669" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Bed legs -->
  <rect x="235" y="358" width="10" height="50" rx="4" fill="#003588"/>
  <rect x="490" y="358" width="10" height="50" rx="4" fill="#003588"/>

  <!-- ===== NURSE FIGURE (left side) ===== -->
  <!-- Nurse body (scrubs - deep blue) -->
  <rect x="100" y="255" width="75" height="110" rx="22" fill="#003588"/>
  <!-- Scrub collar/trim -->
  <rect x="122" y="255" width="30" height="22" rx="10" fill="#FFFFFF" opacity="0.9"/>
  <!-- Stethoscope around neck -->
  <path d="M122 268 Q110 280 108 295 Q108 308 118 308" stroke="#059669" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <circle cx="119" cy="310" r="7" fill="#059669"/>
  <!-- Nurse head -->
  <ellipse cx="138" cy="236" rx="28" ry="30" fill="#E8F0F7"/>
  <!-- Nurse hair -->
  <path d="M112 228 Q112 212 138 210 Q164 212 164 228" fill="#003588"/>
  <!-- Nurse cap -->
  <rect x="122" y="212" width="32" height="8" rx="4" fill="#FFFFFF"/>
  <!-- Nurse arm reaching right -->
  <path d="M172 280 Q210 270 250 295" stroke="#003588" stroke-width="18" stroke-linecap="round" fill="none"/>
  <ellipse cx="252" cy="296" rx="13" ry="11" fill="#E8F0F7"/>
  <!-- Other arm holding chart -->
  <rect x="70" y="278" width="36" height="46" rx="6" fill="#FFFFFF"/>
  <rect x="80" y="270" width="16" height="12" rx="6" fill="#93c5fd"/>
  <!-- Chart lines -->
  <rect x="76" y="292" width="22" height="4" rx="2" fill="#E8F0F7"/>
  <rect x="76" y="302" width="18" height="4" rx="2" fill="#E8F0F7"/>
  <rect x="76" y="312" width="20" height="4" rx="2" fill="#E8F0F7"/>
  <!-- Nurse legs -->
  <rect x="106" y="358" width="28" height="55" rx="12" fill="#003588"/>
  <rect x="142" y="358" width="28" height="55" rx="12" fill="#003588"/>
  <!-- Shoes -->
  <rect x="102" y="406" width="36" height="14" rx="7" fill="#061535"/>
  <rect x="138" y="406" width="36" height="14" rx="7" fill="#061535"/>

  <!-- ===== MONITOR STAND (background right) ===== -->
  <rect x="440" y="200" width="70" height="110" rx="8" fill="#003588" stroke="#266AFB" stroke-width="1.5"/>
  <rect x="450" y="212" width="50" height="60" rx="5" fill="#061535"/>
  <!-- Heart rate line -->
  <polyline points="456,242 464,232 470,248 478,228 486,244 494,236" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Monitor labels -->
  <rect x="452" y="280" width="20" height="4" rx="2" fill="#93c5fd" opacity="0.6"/>
  <rect x="478" y="280" width="16" height="4" rx="2" fill="#059669" opacity="0.6"/>
  <!-- Stand pole -->
  <rect x="471" y="310" width="8" height="90" rx="3" fill="#003588"/>
  <rect x="450" y="396" width="50" height="8" rx="4" fill="#003588"/>

  <!-- ===== TEAL GLOW ACCENTS ===== -->
  <!-- Glow around machine screen -->
  <rect x="544" y="174" width="172" height="98" rx="10" fill="none" stroke="#059669" stroke-width="1" opacity="0.4"/>
  <!-- Floor accent line -->
  <rect x="0" y="418" width="800" height="3" fill="#059669" opacity="0.4"/>
  <!-- Ambient light dots -->
  <circle cx="180" cy="140" r="4" fill="#059669" opacity="0.5"/>
  <circle cx="200" cy="120" r="3" fill="#266AFB" opacity="0.4"/>
  <circle cx="160" cy="120" r="5" fill="#059669" opacity="0.3"/>
  <circle cx="700" cy="130" r="4" fill="#059669" opacity="0.4"/>
  <circle cx="720" cy="150" r="3" fill="#266AFB" opacity="0.35"/>
</svg>
