<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#003588"/>

  <!-- Glucometer device body -->
  <rect x="52" y="52" width="96" height="72" rx="14" fill="#061535"/>
  <rect x="52" y="52" width="96" height="72" rx="14" stroke="#266AFB" stroke-width="2.5" fill="none"/>

  <!-- Device screen/display -->
  <rect x="64" y="64" width="72" height="38" rx="8" fill="#FFFFFF"/>
  <!-- Screen inner glow -->
  <rect x="64" y="64" width="72" height="38" rx="8" fill="none" stroke="#059669" stroke-width="1" opacity="0.7"/>

  <!-- Number display on screen (simplified blocks suggesting digits) -->
  <!-- "1" digit -->
  <rect x="74" y="73" width="6" height="18" rx="2" fill="#003588"/>
  <!-- "0" digit -->
  <rect x="84" y="73" width="10" height="18" rx="4" fill="#003588"/>
  <rect x="87" y="77" width="4" height="10" rx="2" fill="#FFFFFF"/>
  <!-- "2" digit -->
  <rect x="98" y="73" width="10" height="4" rx="2" fill="#003588"/>
  <rect x="98" y="80" width="10" height="4" rx="2" fill="#003588"/>
  <rect x="98" y="87" width="10" height="4" rx="2" fill="#003588"/>
  <rect x="98" y="73" width="4" height="11" rx="2" fill="#003588"/>
  <rect x="104" y="80" width="4" height="11" rx="2" fill="#003588"/>

  <!-- Unit indicator (small rectangle) -->
  <rect x="114" y="75" width="16" height="5" rx="2" fill="#059669"/>
  <rect x="114" y="83" width="12" height="5" rx="2" fill="#059669" opacity="0.6"/>

  <!-- Device test strip slot -->
  <rect x="82" y="110" width="36" height="8" rx="4" fill="#266AFB" opacity="0.6"/>
  <!-- Test strip -->
  <rect x="95" y="105" width="10" height="18" rx="3" fill="#93c5fd"/>

  <!-- Lancet/finger prick device (bottom right) -->
  <rect x="118" y="118" width="22" height="34" rx="8" fill="#266AFB"/>
  <circle cx="129" cy="158" r="5" fill="#FFFFFF"/>

  <!-- Blood drop (teal) -->
  <path d="M54 130 Q54 116 62 112 Q70 116 70 130 Q70 140 62 140 Q54 140 54 130Z" fill="#059669"/>
  <!-- Shine on drop -->
  <ellipse cx="59" cy="122" rx="3" ry="4" fill="#FFFFFF" opacity="0.4"/>

  <!-- Decorative teal accent dots -->
  <circle cx="158" cy="58" r="5" fill="#059669" opacity="0.6"/>
  <circle cx="168" cy="70" r="3" fill="#059669" opacity="0.4"/>
  <circle cx="40" cy="68" r="4" fill="#266AFB" opacity="0.5"/>
</svg>
