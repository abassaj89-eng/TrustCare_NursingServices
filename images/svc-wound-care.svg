<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Dark blue circle background -->
  <circle cx="60" cy="60" r="58" fill="#003588"/>

  <!-- Bandage/gauze pad - main rectangle -->
  <rect x="22" y="42" width="76" height="36" rx="10" fill="#FFFFFF"/>
  <!-- Bandage end strips (teal) -->
  <rect x="22" y="42" width="22" height="36" rx="10" fill="#059669"/>
  <rect x="76" y="42" width="22" height="36" rx="10" fill="#059669"/>
  <!-- Gauze texture lines on white area -->
  <line x1="48" y1="52" x2="72" y2="52" stroke="#E8F0F7" stroke-width="2"/>
  <line x1="48" y1="58" x2="72" y2="58" stroke="#E8F0F7" stroke-width="2"/>
  <line x1="48" y1="64" x2="72" y2="64" stroke="#E8F0F7" stroke-width="2"/>
  <!-- Medical cross on white pad -->
  <rect x="56" y="51" width="8" height="18" rx="2" fill="#059669"/>
  <rect x="51" y="56" width="18" height="8" rx="2" fill="#059669"/>
</svg>
