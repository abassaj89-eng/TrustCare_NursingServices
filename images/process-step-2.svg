<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Circle background -->
  <circle cx="40" cy="40" r="38" fill="#003588"/>

  <!-- Clock body -->
  <circle cx="36" cy="40" r="22" fill="#FFFFFF"/>
  <circle cx="36" cy="40" r="22" stroke="#E8F0F7" stroke-width="1.5" fill="none"/>
  <!-- Clock face inner -->
  <circle cx="36" cy="40" r="2.5" fill="#003588"/>
  <!-- Clock hands -->
  <line x1="36" y1="40" x2="36" y2="22" stroke="#003588" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="40" x2="50" y2="45" stroke="#003588" stroke-width="2" stroke-linecap="round"/>
  <!-- Clock tick marks -->
  <line x1="36" y1="19" x2="36" y2="23" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="57" x2="36" y2="61" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="40" x2="19" y2="40" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
  <line x1="53" y1="40" x2="57" y2="40" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>

  <!-- Magnifying glass overlay -->
  <circle cx="56" cy="52" r="12" fill="#059669" opacity="0.9"/>
  <circle cx="56" cy="52" r="8" fill="#003588"/>
  <circle cx="56" cy="52" r="8" stroke="#FFFFFF" stroke-width="2" fill="none"/>
  <!-- Magnifying glass handle -->
  <line x1="62" y1="58" x2="68" y2="65" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <!-- Inner glass sheen -->
  <line x1="52" y1="48" x2="55" y2="51" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
