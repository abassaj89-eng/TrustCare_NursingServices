<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Dark blue circle background -->
  <circle cx="60" cy="60" r="58" fill="#003588"/>

  <!-- Person 1 (trainer - left) -->
  <circle cx="38" cy="42" r="12" fill="#FFFFFF"/>
  <rect x="24" y="58" width="28" height="30" rx="10" fill="#266AFB"/>
  <!-- Person 2 (trainee - right) -->
  <circle cx="82" cy="42" r="12" fill="#FFFFFF"/>
  <rect x="68" y="58" width="28" height="30" rx="10" fill="#FFFFFF" opacity="0.85"/>

  <!-- Knowledge/speech bubble between them -->
  <rect x="36" y="22" width="48" height="30" rx="10" fill="#059669"/>
  <!-- Bubble tail -->
  <path d="M52 52 L46 62 L62 52Z" fill="#059669"/>
  <!-- Graduation cap icon inside bubble -->
  <!-- Cap base -->
  <rect x="50" y="37" width="20" height="5" rx="2" fill="#FFFFFF"/>
  <!-- Cap top -->
  <path d="M60 28 L48 35 L60 42 L72 35Z" fill="#FFFFFF"/>
  <!-- Cap tassel -->
  <line x1="72" y1="35" x2="76" y2="45" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <circle cx="76" cy="47" r="3" fill="#FFFFFF"/>
</svg>
