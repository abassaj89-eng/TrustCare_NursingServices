<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Background: transparent -->

  <!-- Patient bed/surface -->
  <rect x="180" y="270" width="260" height="12" rx="6" fill="#E8F0F7"/>
  <rect x="160" y="278" width="290" height="8" rx="4" fill="#93c5fd"/>

  <!-- Patient figure (reclining) -->
  <!-- Body -->
  <rect x="190" y="220" width="180" height="55" rx="28" fill="#E8F0F7"/>
  <!-- Head -->
  <ellipse cx="390" cy="230" rx="28" ry="30" fill="#E8F0F7"/>
  <!-- Pillow -->
  <ellipse cx="395" cy="248" rx="35" ry="18" fill="#FFFFFF" opacity="0.7"/>

  <!-- Nurse figure (seated left) -->
  <!-- Nurse body/scrubs -->
  <rect x="110" y="195" width="70" height="90" rx="20" fill="#003588"/>
  <!-- Nurse white trim collar -->
  <rect x="132" y="195" width="26" height="18" rx="8" fill="#FFFFFF" opacity="0.9"/>
  <!-- Nurse head -->
  <ellipse cx="145" cy="178" rx="24" ry="26" fill="#E8F0F7"/>
  <!-- Nurse hair -->
  <ellipse cx="145" cy="160" rx="24" ry="14" fill="#003588"/>
  <!-- Nurse cap hint -->
  <rect x="125" y="158" width="40" height="8" rx="4" fill="#FFFFFF" opacity="0.8"/>
  <!-- Nurse arm extended toward patient -->
  <path d="M175 230 Q220 218 260 235" stroke="#003588" stroke-width="16" stroke-linecap="round" fill="none"/>
  <!-- Nurse hand -->
  <ellipse cx="262" cy="236" rx="12" ry="10" fill="#E8F0F7"/>
  <!-- Nurse legs -->
  <rect x="115" y="278" width="26" height="40" rx="10" fill="#003588"/>
  <rect x="148" y="278" width="26" height="40" rx="10" fill="#003588"/>
  <!-- Nurse shoes -->
  <rect x="112" y="312" width="32" height="12" rx="6" fill="#061535"/>
  <rect x="145" y="312" width="32" height="12" rx="6" fill="#061535"/>

  <!-- Medical bag -->
  <rect x="55" y="268" width="55" height="44" rx="8" fill="#003588"/>
  <rect x="70" y="258" width="25" height="14" rx="6" fill="#266AFB"/>
  <!-- Bag cross -->
  <rect x="75" y="282" width="16" height="4" rx="2" fill="#FFFFFF"/>
  <rect x="81" y="276" width="4" height="16" rx="2" fill="#FFFFFF"/>
  <!-- Clipboard -->
  <rect x="468" y="200" width="48" height="62" rx="6" fill="#FFFFFF"/>
  <rect x="478" y="193" width="28" height="10" rx="5" fill="#93c5fd"/>
  <rect x="475" y="220" width="34" height="4" rx="2" fill="#E8F0F7"/>
  <rect x="475" y="230" width="28" height="4" rx="2" fill="#E8F0F7"/>
  <rect x="475" y="240" width="30" height="4" rx="2" fill="#E8F0F7"/>

  <!-- Heart/care symbol between nurse and patient -->
  <path d="M285 170 C285 160 298 153 305 163 C312 153 325 160 325 170 C325 182 305 198 305 198 C305 198 285 182 285 170Z" fill="#059669"/>

  <!-- Teal accent dots -->
  <circle cx="460" cy="160" r="6" fill="#059669" opacity="0.6"/>
  <circle cx="480" cy="150" r="4" fill="#059669" opacity="0.4"/>
  <circle cx="500" cy="165" r="5" fill="#266AFB" opacity="0.5"/>

  <!-- Decorative background circles -->
  <circle cx="540" cy="80" r="55" fill="#E8F0F7" opacity="0.3"/>
  <circle cx="80" cy="100" r="40" fill="#E8F0F7" opacity="0.25"/>
</svg>
