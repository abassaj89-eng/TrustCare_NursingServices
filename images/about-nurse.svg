<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Background: transparent -->

  <!-- Subtle background circle -->
  <circle cx="150" cy="180" r="145" fill="#E8F0F7" opacity="0.3"/>

  <!-- Body / uniform -->
  <rect x="60" y="200" width="180" height="170" rx="40" fill="#003588"/>

  <!-- White uniform collar -->
  <path d="M120 200 L150 240 L180 200" fill="#FFFFFF" opacity="0.95"/>

  <!-- Stethoscope -->
  <path d="M120 210 Q100 240 98 268 Q98 285 112 285" stroke="#059669" stroke-width="5" stroke-linecap="round" fill="none"/>
  <circle cx="113" cy="288" r="10" fill="#059669"/>
  <!-- Stethoscope ear piece right -->
  <path d="M180 210 Q200 240 202 268 Q202 285 188 285" stroke="#059669" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Arms -->
  <path d="M60 235 Q40 250 45 280 Q48 298 65 295" stroke="#003588" stroke-width="28" stroke-linecap="round" fill="none"/>
  <path d="M240 235 Q260 250 255 280 Q252 298 235 295" stroke="#003588" stroke-width="28" stroke-linecap="round" fill="none"/>

  <!-- Hands -->
  <ellipse cx="64" cy="296" rx="18" ry="14" fill="#E8F0F7"/>
  <ellipse cx="236" cy="296" rx="18" ry="14" fill="#E8F0F7"/>

  <!-- Neck -->
  <rect x="132" y="162" width="36" height="42" rx="16" fill="#E8F0F7"/>

  <!-- Head -->
  <ellipse cx="150" cy="140" rx="60" ry="68" fill="#E8F0F7"/>

  <!-- Hair -->
  <path d="M94 126 Q90 88 150 80 Q210 88 206 126 Q200 105 150 103 Q100 105 94 126Z" fill="#003588"/>

  <!-- Nurse cap on head -->
  <rect x="110" y="90" width="80" height="18" rx="8" fill="#FFFFFF"/>
  <rect x="125" y="82" width="50" height="12" rx="6" fill="#FFFFFF" opacity="0.8"/>
  <!-- Cap stripe -->
  <rect x="110" y="100" width="80" height="5" rx="2" fill="#059669"/>

  <!-- Face features (minimal) -->
  <ellipse cx="133" cy="140" rx="6" ry="5" fill="#93c5fd" opacity="0.6"/>
  <ellipse cx="167" cy="140" rx="6" ry="5" fill="#93c5fd" opacity="0.6"/>
  <path d="M138 160 Q150 168 162 160" stroke="#003588" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- AHPRA Badge / shield at chest -->
  <rect x="136" y="228" width="28" height="34" rx="6" fill="#059669"/>
  <path d="M150 228 L164 233 L164 248 Q164 262 150 266 Q136 262 136 248 L136 233 Z" fill="#059669"/>
  <!-- Badge cross -->
  <rect x="145" y="240" width="10" height="3" rx="1.5" fill="#FFFFFF"/>
  <rect x="148.5" y="237" width="3" height="10" rx="1.5" fill="#FFFFFF"/>
  <!-- Badge outline -->
  <path d="M150 228 L164 233 L164 248 Q164 262 150 266 Q136 262 136 248 L136 233 Z" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>

  <!-- Scrubs waist detail -->
  <rect x="65" y="315" width="170" height="6" rx="3" fill="#266AFB" opacity="0.5"/>

  <!-- Pocket on uniform -->
  <rect x="76" y="248" width="38" height="32" rx="6" fill="#266AFB" opacity="0.3"/>
  <rect x="76" y="248" width="38" height="32" rx="6" stroke="#266AFB" stroke-width="1.5" fill="none"/>
</svg>
