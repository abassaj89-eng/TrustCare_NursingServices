<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Circle background -->
  <circle cx="40" cy="40" r="38" fill="#003588"/>

  <!-- Document / agreement sheet -->
  <rect x="22" y="18" width="36" height="44" rx="5" fill="#FFFFFF"/>
  <!-- Document clip -->
  <rect x="32" y="13" width="16" height="9" rx="4.5" fill="#93c5fd"/>

  <!-- Document lines -->
  <rect x="28" y="30" width="24" height="3" rx="1.5" fill="#E8F0F7"/>
  <rect x="28" y="38" width="18" height="3" rx="1.5" fill="#E8F0F7"/>

  <!-- Signature line -->
  <line x1="28" y1="52" x2="52" y2="52" stroke="#E8F0F7" stroke-width="1.5"/>
  <!-- Signature squiggle (teal) -->
  <path d="M28 50 Q33 46 38 50 Q43 54 48 50" stroke="#059669" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Check mark badge in corner -->
  <circle cx="56" cy="22" r="12" fill="#059669"/>
  <path d="M50 22 L54 27 L63 16" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
