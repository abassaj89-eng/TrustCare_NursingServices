<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Circle background -->
  <circle cx="40" cy="40" r="38" fill="#003588"/>

  <!-- Patient figure (right, reclining simplified) -->
  <!-- Patient body -->
  <rect x="38" y="36" width="28" height="18" rx="10" fill="#E8F0F7"/>
  <!-- Patient head -->
  <circle cx="66" cy="36" r="10" fill="#E8F0F7"/>

  <!-- Small bed surface -->
  <rect x="32" y="52" width="38" height="5" rx="2.5" fill="#93c5fd" opacity="0.7"/>

  <!-- Nurse figure (left) -->
  <!-- Nurse head -->
  <circle cx="20" cy="26" r="9" fill="#E8F0F7"/>
  <!-- Nurse cap -->
  <rect x="13" y="20" width="14" height="5" rx="2.5" fill="#FFFFFF"/>
  <!-- Nurse body -->
  <rect x="12" y="36" width="16" height="20" rx="7" fill="#FFFFFF" opacity="0.9"/>
  <!-- Nurse arm extending toward patient -->
  <path d="M28 44 Q35 42 40 44" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Heart teal accent between them -->
  <path d="M35 31 C35 27 41 24 44 29 C47 24 53 27 53 31 C53 37 44 43 44 43 C44 43 35 37 35 31Z" fill="#059669"/>
</svg>
