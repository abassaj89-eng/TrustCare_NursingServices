<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#003588"/>

  <!-- Lung left -->
  <path d="M52 85 Q42 75 42 95 Q42 125 52 140 Q60 152 72 148 Q82 144 82 130 L82 110 Q82 90 72 82 Q62 74 52 85Z" fill="#061535" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- Lung left inner detail -->
  <path d="M58 100 Q52 110 54 126 Q56 136 64 134" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M65 95 Q60 108 62 122" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Lung right -->
  <path d="M148 85 Q158 75 158 95 Q158 125 148 140 Q140 152 128 148 Q118 144 118 130 L118 110 Q118 90 128 82 Q138 74 148 85Z" fill="#061535" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- Lung right inner detail -->
  <path d="M142 100 Q148 110 146 126 Q144 136 136 134" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M135 95 Q140 108 138 122" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Trachea / main airway -->
  <rect x="88" y="42" width="24" height="65" rx="12" fill="#061535" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- Bronchi split -->
  <path d="M88 107 Q75 115 75 128" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M112 107 Q125 115 125 128" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Tracheal rings on trachea -->
  <rect x="86" y="55" width="28" height="5" rx="2.5" fill="#93c5fd" opacity="0.7"/>
  <rect x="86" y="65" width="28" height="5" rx="2.5" fill="#93c5fd" opacity="0.7"/>
  <rect x="86" y="75" width="28" height="5" rx="2.5" fill="#93c5fd" opacity="0.7"/>
  <rect x="86" y="85" width="28" height="5" rx="2.5" fill="#93c5fd" opacity="0.7"/>

  <!-- Tracheostomy tube (horizontal, entering trachea from front) -->
  <rect x="64" y="55" width="36" height="14" rx="7" fill="#059669"/>
  <!-- Tube flange -->
  <rect x="56" y="52" width="16" height="20" rx="5" fill="#059669"/>
  <!-- Tube connector circle -->
  <circle cx="50" cy="62" r="10" fill="#003588" stroke="#059669" stroke-width="3"/>
  <!-- Inner connector -->
  <circle cx="50" cy="62" r="5" fill="#059669" opacity="0.5"/>

  <!-- Teal accent on tube -->
  <rect x="64" y="60" width="36" height="4" rx="2" fill="#FFFFFF" opacity="0.4"/>

  <!-- Air flow arrows (teal) -->
  <path d="M100 22 L100 40" stroke="#059669" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#059669"/>
    </marker>
  </defs>
  <!-- Second air arrow -->
  <circle cx="100" cy="20" r="5" fill="#059669" opacity="0.7"/>
  <circle cx="88" cy="16" r="3" fill="#059669" opacity="0.5"/>
  <circle cx="112" cy="16" r="3" fill="#059669" opacity="0.5"/>
</svg>
