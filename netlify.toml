[build]
  command = "bundle exec jekyll build"
  publish = "_site"

[build.environment]
  JEKYLL_ENV = "production"
  RUBY_VERSION = "3.2.0"

# Redirect www → non-www (canonical domain)
[[redirects]]
  from = "https://www.trustcaresupport.com.au/*"
  to   = "https://trustcaresupport.com.au/:splat"
  status = 301
  force  = true
