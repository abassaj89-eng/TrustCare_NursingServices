[build]
  command = "echo \"google_maps_api_key: $GOOGLE_MAPS_API_KEY\" > _config_env.yml && bundle exec jekyll build --config _config.yml,_config_env.yml"
  publish = "_site"

[build.environment]
  JEKYLL_ENV = "production"
  RUBY_VERSION = "3.2.0"

# ── Canonical domain — www → non-www ──────────────────────────────────────────
[[redirects]]
  from   = "https://www.trustcaresupport.com.au/*"
  to     = "https://trustcaresupport.com.au/:splat"
  status = 301
  force  = true

# ── Service sub-path aliases → canonical landing pages ────────────────────────
# Handles any inbound links that used a /services/* prefix pattern.
[[redirects]]
  from   = "/services/tracheostomy-care/"
  to     = "/tracheostomy-care/"
  status = 301

[[redirects]]
  from   = "/services/wound-care/"
  to     = "/wound-care/"
  status = 301

[[redirects]]
  from   = "/services/complex-bowel-care/"
  to     = "/complex-bowel-care/"
  status = 301

[[redirects]]
  from   = "/services/peg-enteral-feeding/"
  to     = "/peg-enteral-feeding/"
  status = 301

[[redirects]]
  from   = "/services/catheter-management/"
  to     = "/catheter-management/"
  status = 301

[[redirects]]
  from   = "/services/diabetes-management/"
  to     = "/diabetes-management/"
  status = 301

[[redirects]]
  from   = "/services/seizure-management/"
  to     = "/seizure-management/"
  status = 301

[[redirects]]
