recaptcha_site_key: "6Lc9Ep8sAAAAAEr8D8lrMn-PdZKVfyugRh3dQpLn"

title: "TrustCare Support"
description: "TrustCare Support is Perth's NDIS nursing subcontractor — delivering AHPRA-registered clinical care, HIDPA training and complex nursing support for registered NDIS providers in WA."
url: "https://trustcaresupport.com.au"
baseurl: ""

# URL structure
permalink: /:title/

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Exclude from Jekyll build
exclude:
  - .claude/
  - node_modules/
  - vendor/
  - Gemfile.lock
  - README.md
  - DEPLOYMENT.md
  - CMS-GUIDE.md
  - HANDOVER.md

# Collections
collections:
  jobs:
    output: false

# Default front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: jobs
    values:
      active: true
