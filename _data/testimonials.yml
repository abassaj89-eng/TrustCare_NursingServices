items:
  - quote: "We needed a clinical nursing partner who could step in quickly for complex participants without creating confusion about who owns the care relationship. TrustCare operates entirely within our service framework — the 48-hour clinical reporting alone saves us hours of coordination every week."
    role: "Support Coordinator"
    organisation: "Registered NDIS Provider, Perth"

  - quote: "Our support workers were delivering HIDPA tasks for several participants but we had no RN to sign off competencies under the new Skills Descriptors. TrustCare resolved this in a week — assessments documented, care plans signed off, and our NDIS Commission audit file is now compliant."
    role: "Operations Manager"
    organisation: "Registered NDIS Provider, Perth Metro"

  - quote: "We had tried agency nurses and it never worked — inconsistent workers, no care plans, no continuity. With TrustCare, we have one RN who knows our participants, writes the care plans, and communicates directly with our team. It is a genuinely different model."
    role: "Service Manager"
    organisation: "Registered NDIS Provider, Perth"
