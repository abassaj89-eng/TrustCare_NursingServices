title: "Participant Rights Statement"
heading_main: "Participant"
heading_highlight: "Rights Statement"
eyebrow: "Your Rights"
intro: "TrustCare Support is committed to upholding the rights of every participant we support. These rights are grounded in the National Disability Insurance Scheme Act 2013 and the NDIS Code of Conduct."
content: |
  ### 1. Dignity and Respect

  You have the right to be treated with dignity and respect at all times. Our nurses will always maintain professional, person-centred care that honours your individuality and humanity.

  ### 2. Informed Decision-Making

  You have the right to make informed decisions about your own health and care. We will explain all clinical procedures clearly and seek your consent before proceeding with any intervention.

  ### 3. Privacy and Confidentiality

  Your personal and health information is collected and stored in accordance with the *Privacy Act 1988* (Cth). It is never shared without your consent except where required by law.

  ### 4. Safety and Quality Care

  You have the right to receive safe, high-quality nursing care delivered by an AHPRA-registered Registered Nurse in accordance with NMBA Registered Nurse Standards for Practice (2016).

  ### 5. Freedom from Abuse and Neglect

  We have zero tolerance for any form of abuse, neglect, or exploitation. All clinical staff adhere strictly to the NDIS Code of Conduct and relevant legislation.

  ### 6. Make a Complaint

  You have the right to raise concerns or make a complaint without fear of reprisal. See our Complaints Policy or contact the NDIS Quality and Safeguards Commission:

  🌐 [ndiscommission.gov.au](https://www.ndiscommission.gov.au) | 📞 1800 035 544

  ### 7. Support Person

  You have the right to have a support person, advocate, or representative present during any assessment, consultation, or care delivery. We welcome and support this right.
