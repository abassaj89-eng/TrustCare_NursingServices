title: "Participant Rights Statement"
heading_main: "Participant"
heading_highlight: "Rights Statement"
eyebrow: "Your Rights"
last_updated: "March 2026"
intro: "TrustCare Support is committed to upholding the rights of every participant we support. These rights are grounded in the National Disability Insurance Scheme Act 2013 (Cth), the NDIS Code of Conduct, and the Disability Services Act 1993 (WA)."
content: |
  ### 1. Dignity and Respect

  You have the right to be treated with dignity and respect at all times. Our nurses will always maintain professional, person-centred care that honours your individuality, worth and humanity. This right is enshrined in section 4 of the *NDIS Act 2013* (Cth) and Schedule 1 of the *Disability Services Act 1993* (WA).

  ### 2. Informed Decision-Making and Choice

  You have the right to make informed decisions about your own health and care — including taking reasonable risks in pursuing your goals. We will explain all clinical procedures clearly and seek your consent before proceeding with any intervention. You have the right to exercise choice and control as an equal partner in decisions affecting your life.

  ### 3. Privacy and Confidentiality

  Your personal and health information is collected and stored in accordance with the *Privacy Act 1988* (Cth) and the Australian Privacy Principles (APPs). Health information is sensitive information under the Act and is handled with the highest standard of care. It is never shared without your consent except where required by law or to protect your safety or the safety of others.

  ### 4. Safe, Quality Care

  You have the right to receive safe, high-quality nursing care delivered by an AHPRA-registered Registered Nurse in accordance with the NMBA Registered Nurse Standards for Practice (2016). All care is delivered within the defined scope of practice of a Registered Nurse.

  ### 5. Freedom from Abuse, Neglect and Exploitation

  You have the right to live free from all forms of abuse, neglect, exploitation and unlawful discrimination. TrustCare has zero tolerance for any such conduct. All clinical staff are bound by the NDIS Code of Conduct, including the obligation to take all reasonable steps to prevent and respond to violence, exploitation, neglect and abuse.

  ### 6. Self-Determination and Independence

  You have the right to determine your own best interests and to have supports delivered in a manner that promotes your independence, community participation, and individual capacity — not in a manner that creates unnecessary dependence on services.

  ### 7. Access to an Advocate

  You have the right to have a support person, advocate, or authorised representative present during any assessment, consultation, or care delivery. We welcome and actively support this right. Advocacy organisations are available to assist you at no cost.

  ### 8. Make a Complaint Without Fear

  You have the right to raise concerns, provide feedback, or make a complaint at any time — without fear of reprisal, disadvantage, or adverse action. See our [Complaints Policy](/complaints-policy/) or contact the NDIS Quality and Safeguards Commission:

  🌐 [ndiscommission.gov.au](https://www.ndiscommission.gov.au) | 📞 1800 035 544

  The Commission can also be contacted about any concerns regarding the conduct of TrustCare Support or our staff.

  ### 9. Right to End or Change Services

  You have the right to change provider, vary the supports you receive, or end the service agreement at any time in accordance with the agreed notice period. TrustCare will provide a minimum of 14 days' written notice before ending any service arrangement.

  ### 10. Grievance Rights

  You have the same right as all Australians to pursue grievances in relation to services. In addition to TrustCare's internal complaints process, you may also contact:

  - **NDIS Quality and Safeguards Commission** — complaints about NDIS supports: 📞 1800 035 544
  - **Health and Disability Services Complaints Office (HaDSCO) WA** — complaints about health and disability services in WA: 📞 1800 813 583 | 🌐 [hadsco.wa.gov.au](https://www.hadsco.wa.gov.au)
  - **Office of the Australian Information Commissioner (OAIC)** — privacy complaints: 🌐 [oaic.gov.au](https://www.oaic.gov.au)
  - **AHPRA** — concerns about registered nurse conduct: 🌐 [ahpra.gov.au](https://www.ahpra.gov.au)
