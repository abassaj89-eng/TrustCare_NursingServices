  ### 1. About This Policy

  Trust Care Nursing Services and Consulting Pty Ltd (ABN: 18 809 341 867) trading as TrustCare Support ("we", "us", "our") is committed to protecting your personal information in accordance with the *Privacy Act 1988* (Cth) and the Australian Privacy Principles (APPs). This policy explains how we collect, use, store and disclose your personal information when you interact with our website or clinical services.

  ### 2. What Personal Information We Collect

  We may collect the following types of personal information: names and contact details (email, phone, address), organisation name and role, NDIS plan information (general), health and clinical information relevant to nursing care, referral details from NDIS providers and support coordinators, and any other information you provide through our website forms or direct contact.

  ### 3. Sensitive Health Information

  Health information is classified as sensitive information under the *Privacy Act 1988* (Cth). We collect sensitive health information only where it is necessary for clinical triage and care delivery. Sensitive health information is collected with your explicit consent, or that of your authorised representative, prior to collection. We handle all health information with the highest standard of care and confidentiality.

  ### 4. How We Collect Information

  We collect personal information through: website forms (referral, contact, complaints, and feedback forms); direct contact via phone or email; referrals from registered NDIS providers and support coordinators. We collect only the minimum information necessary for the relevant purpose.

  ### 5. How We Use Your Information

  We use personal information to: conduct clinical triage and prioritise nursing referrals; deliver nursing and clinical support services; communicate with treating teams (GP, allied health) with consent; improve our services and clinical quality; and comply with legal and regulatory obligations including under the NDIS Act and AHPRA registration requirements.

  ### 6. Disclosure of Information

  Your personal information is not sold or shared with third parties for marketing purposes. We may disclose information to: treating clinicians and allied health professionals (with consent); registered NDIS providers engaged in the participant's care; regulatory bodies (including AHPRA and the NDIS Quality and Safeguards Commission) where required by law. Your information is not disclosed overseas.

  ### 7. Data Storage and Security

  All information submitted via our website is transmitted using HTTPS/TLS encryption. Data is stored on Australian-based servers. We take reasonable technical and organisational security measures to protect your information from misuse, interference, loss, and unauthorised access, modification, or disclosure.

  ### 8. Access and Correction

  You have the right to access and correct your personal information at any time. To request access or corrections, contact us at [admin@trustcaresupport.com.au](mailto:admin@trustcaresupport.com.au). We will respond within a reasonable timeframe.

  ### 9. Complaints About Privacy

  If you have a concern about how we have handled your personal information, please contact us first at [admin@trustcaresupport.com.au](mailto:admin@trustcaresupport.com.au). If your concern is not resolved to your satisfaction, you have the right to contact the Office of the Australian Information Commissioner (OAIC) at [oaic.gov.au](https://www.oaic.gov.au).

