eyebrow: "Policy"
intro: "TrustCare Support is committed to a fair, transparent and timely complaints process. We welcome feedback as an opportunity to improve our services and the care we provide to participants."
content: |
  ### 1. How to Make a Complaint

  You can make a complaint using any of the following methods:

  - **Email:** [admin@trustcaresupport.com.au](mailto:admin@trustcaresupport.com.au)
  - **Phone:** 0432 014 162
  - **Written:** Perth, Western Australia
  - **Online:** Use our online complaints form on this website

  ### 2. Our Process

  - Acknowledge your complaint within 2 business days
  - Investigate and respond within 14 business days
  - Complex complaints may take up to 28 business days — you will be informed of any delay
  - Keep you informed throughout the investigation process
  - Provide a written outcome and any corrective actions taken

  ### 3. Escalation — NDIS Quality and Safeguards Commission

  If your concern is not resolved to your satisfaction, you have the right to contact the NDIS Quality and Safeguards Commission:

  🌐 [www.ndiscommission.gov.au](https://www.ndiscommission.gov.au)
  📞 1800 035 544

  ### 4. Confidentiality

  All complaints are treated with strict confidentiality. No adverse action will be taken against any person who makes a complaint in good faith. You have the right to have a support person, advocate, or representative assist you throughout this process.
