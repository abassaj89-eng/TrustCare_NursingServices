eyebrow: "Group A"
group_title: "High-Intensity Daily Personal Activities (HIDPA)"
items:
  - icon: "🫁"
    tag: "HIDPA"
    title: "Complex Bowel Care"
    description: "Enema, suppository, and ostomy management delivered by a competency-assessed Registered Nurse following participant-specific support plans."
  - icon: "🍼"
    tag: "HIDPA"
    title: "Enteral Feeding — PEG and PEJ Management"
    description: "Safe administration of feeds and medications via PEG and PEJ tubes, stoma site care, and complication monitoring."
  - icon: "🫀"
    tag: "HIDPA"
    title: "Tracheostomy Care and Airway Management"
    description: "Stoma care, inner cannula management, suctioning, and emergency response for participants with a tracheostomy in situ."
  - icon: "💨"
    tag: "HIDPA"
    title: "Ventilation Support and Respiratory Monitoring"
    description: "Monitoring ventilator settings and alarms, circuit management, and recognising signs of respiratory deterioration."
  - icon: "⚡"
    tag: "HIDPA"
    title: "Seizure Management and Emergency Medication"
    description: "Seizure support including administration of intranasal and buccal midazolam per an emergency medication management plan."
