title: "Incident Management Statement"
heading_main: "Incident Management"
heading_highlight: "Statement"
eyebrow: "Safety"
intro: "TrustCare Support is committed to the safety and wellbeing of all participants receiving clinical nursing care."
content: |
  ### 1. Our Commitment

  We maintain a proactive incident management approach consistent with the *NDIS (Incident Management and Reportable Incidents) Rules 2018*. Every incident is taken seriously, documented thoroughly, and responded to promptly to protect participant safety and prevent recurrence.

  ### 2. What is a Reportable Incident

  - Death of a participant
  - Serious injury to a participant
  - Abuse or neglect of a participant
  - Unlawful sexual or physical contact with a participant
  - Use of an unauthorised restrictive practice

  ### 3. Our Response

  - Respond immediately to ensure participant safety
  - Notify the relevant registered NDIS provider partner within required legislative timeframes
  - Document the incident thoroughly and conduct a root cause analysis
  - Implement corrective actions to prevent recurrence

  ### 4. Reporting to the NDIS Commission

  Reportable incidents are notified to the NDIS Quality and Safeguards Commission within required timeframes:

  🌐 [www.ndiscommission.gov.au](https://www.ndiscommission.gov.au)

